name: Update Chess.com games

on:
  workflow_dispatch:
  schedule:
    - cron: "17 * * * *"

permissions:
  contents: write

jobs:
  update-games:
    runs-on: ubuntu-latest

    steps:
      - name: Download repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch latest games
        run: |
          python na3_game_fetcher.py \
            --username Chessicek \
            --months 3 \
            --latest 20 \
            --output latest_games.pgn \
            --json-output latest_games.json

      - name: Fetch latest Na3 games
        shell: bash
        run: |
          set +e
          python na3_game_fetcher.py \
            --username Chessicek \
            --months 12 \
            --latest 100 \
            --na3 \
            --output latest_na3_games.pgn \
            --json-output latest_na3_games.json
          status=$?
          if [ "$status" -ne 0 ] && [ "$status" -ne 2 ]; then
            exit "$status"
          fi

      - name: Build repository index
        run: python build_repository_index.py

      - name: Save updated files
        run: |
          git config user.name "Project Na3 Bot"
          git config user.email "actions@users.noreply.github.com"

          git add \
            latest_games.pgn \
            latest_games.json \
            latest_na3_games.pgn \
            latest_na3_games.json \
            index.json \
            games/latest.pgn \
            games/latest.json \
            na3/latest_na3.pgn \
            na3/latest_na3.json \
            na3/history.json

          git diff --cached --quiet || git commit -m "Update Chess.com games and repository index"
          git push
