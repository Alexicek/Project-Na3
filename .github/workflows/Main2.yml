name: Update Chess.com games

on:
  workflow_dispatch:
  schedule:
    - cron: "17 * * * *"

permissions:
  contents: write

jobs:
  update-games:
    runs-on: ubuntu-latest

    steps:
      - name: Download repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch latest games
        run: |
          python na3_game_fetcher.py             --username Chessicek             --months 3             --latest 20             --output latest_games.pgn             --json-output latest_games.json

      - name: Fetch latest Na3 games
        shell: bash
        run: |
          set +e
          python na3_game_fetcher.py             --username Chessicek             --months 12             --latest 20             --na3             --output latest_na3_games.pgn
          rc=$?
          if [ "$rc" -ne 0 ] && [ "$rc" -ne 2 ]; then
            exit "$rc"
          fi

      - name: Save updated files
        run: |
          git config user.name "Project Na3 Bot"
          git config user.email "actions@users.noreply.github.com"
          git add latest_games.pgn latest_games.json latest_na3_games.pgn
          git diff --cached --quiet || git commit -m "Update Chess.com games"
          git push
